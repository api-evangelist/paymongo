aid: paymongo
url: https://raw.githubusercontent.com/api-evangelist/paymongo/refs/heads/main/apis.yml
name: PayMongo
kind: company
description: PayMongo is a Philippine payments platform that lets businesses accept
  online payments via cards, GCash, Maya (PayMaya), GrabPay, ShopeePay, QR Ph,
  BillEase buy-now-pay-later, and direct online banking. Its REST API is built
  around the Payment Intent / Payment Method workflow with hosted Checkout Sessions,
  Payment Links, Customers, Refunds, Subscriptions, and signed Webhooks. Amounts
  are integers in centavos and PHP is the settlement currency; PayMongo is a
  PCI DSS Level 1 Service Provider.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Payments
- FinTech
- Philippines
- Southeast Asia
- GCash
- E-Wallet
- Card Payments
created: '2026-07-17'
modified: '2026-07-17'
