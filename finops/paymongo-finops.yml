description: >-
  FinOps view of PayMongo costs. Unlike compute/AI providers, PayMongo cost is
  transaction-fee-based: a per-successful-transaction fee that varies by payment
  method (cards, GCash, Maya, GrabPay, ShopeePay, QR Ph, BillEase, direct online
  banking), plus a fixed peso fee on payouts/disbursements. Optional add-ons
  (premium support, Instant Settlement) are a percentage of volume. There is no
  monthly or setup fee. Costs are netted from settlement rather than invoiced as
  cloud usage, so allocation is best driven from Payment and Payout records.
notes: >-
  Per-method rates change; verify against the PayMongo pricing and fees pages at
  reconciliation. Fees are deducted at settlement; net_amount and fee fields on
  the Payment resource are the primary cost signal.
