  unit: transaction
  aggregation: sum
  dimensions:
  - account
- name: dob_transaction_fee
  description: Per-successful-transaction fee for direct online banking.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
- name: payout_fee
  description: Fixed peso fee per payout/disbursement via InstaPay or PESONet.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - rail
- name: instant_settlement_fee
  description: Optional percentage fee for Instant Settlement access.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
- name: premium_support_fee
  description: Optional premium-support fee as a percentage of monthly transaction volume.
  unit: volume
  aggregation: sum
  dimensions:
