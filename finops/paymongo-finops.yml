principles:
- name: Visibility
  description: Reconcile from Payment (fee, net_amount) and Payout records; export payment/payout history from the dashboard.
- name: Allocation
  description: Tag transactions with metadata / reference numbers and map to internal cost centers and channels.
- name: Optimization
  description: Steer customers toward lower-fee methods where appropriate (QR Ph, direct online banking, e-wallets) vs cards; batch payouts to reduce fixed payout fees.
- name: Accountability
  description: Review effective take-rate per channel monthly; decide whether to pass on fees to customers where permitted.
